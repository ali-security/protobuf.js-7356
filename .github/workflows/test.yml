name: Test
on:
  push:
    branches:
    - master
    - main
  pull_request:
    types: [assigned, opened, synchronize, reopened, labeled]
jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v1
    - uses: actions/setup-node@v1
      with:
        node-version: '12'
    - name: Install dependencies
      run: npm install
    - name: Seal Security Fix
      uses: seal-community/cli-action@latest
      with:
        mode: fix
        fix_mode: remote
        token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6ImJhYzE2Mjc3In0..jeGUchiR3D601ON2q_zTSpiGvU9eH2UBN2CTFV0Ya9txLKVPMRX-mtUzlxvhsjFK4aHAzr9KwBA5GCZt_lM2Ph5wmoE70eoO6y-rroxZMSvk5hiIPixNP0EV9AqX9GrDaVpR8YSSo1nkSom5P6Oxl55FbhG2MLRtm_iFOrTfkz-F1OQX42z0NqOBRTe0YKsa_qPE5Hgn0X-DDdoiFQj1Tb0W119b-qGrAYnkTHurhFgtCbF6wnzM91-uUYzXUJL4AHKRqQteH6wuAneg8Ex0wsQTmWKDAajgaPaEe9PH7wwfboijIWBuZxejz0TsLGLYwo5isgpfrayPrc1MowGxcg
        target: package-lock.json
    - name: Lint sources
      run: npm run lint:sources -- --max-warnings 0
    - name: Lint types
      run: npm run lint:types
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node_version: ['12', '14', '16', '18']
    steps:
    - uses: actions/checkout@v1
    - uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node_version }}
    - name: Install dependencies
      run: npm install
    - name: Seal Security Fix
      uses: seal-community/cli-action@latest
      with:
        mode: fix
        fix_mode: remote
        token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6ImJhYzE2Mjc3In0..jeGUchiR3D601ON2q_zTSpiGvU9eH2UBN2CTFV0Ya9txLKVPMRX-mtUzlxvhsjFK4aHAzr9KwBA5GCZt_lM2Ph5wmoE70eoO6y-rroxZMSvk5hiIPixNP0EV9AqX9GrDaVpR8YSSo1nkSom5P6Oxl55FbhG2MLRtm_iFOrTfkz-F1OQX42z0NqOBRTe0YKsa_qPE5Hgn0X-DDdoiFQj1Tb0W119b-qGrAYnkTHurhFgtCbF6wnzM91-uUYzXUJL4AHKRqQteH6wuAneg8Ex0wsQTmWKDAajgaPaEe9PH7wwfboijIWBuZxejz0TsLGLYwo5isgpfrayPrc1MowGxcg
        target: package-lock.json
    - name: Test sources
      run: npm run test:sources
    - name: Test types
      run: npm run test:types
  bench:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v1
    - uses: actions/setup-node@v1
      with:
        node-version: '12'
    - name: Install dependencies
      run: npm install
    - name: Seal Security Fix
      uses: seal-community/cli-action@latest
      with:
        mode: fix
        fix_mode: remote
        token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6ImJhYzE2Mjc3In0..jeGUchiR3D601ON2q_zTSpiGvU9eH2UBN2CTFV0Ya9txLKVPMRX-mtUzlxvhsjFK4aHAzr9KwBA5GCZt_lM2Ph5wmoE70eoO6y-rroxZMSvk5hiIPixNP0EV9AqX9GrDaVpR8YSSo1nkSom5P6Oxl55FbhG2MLRtm_iFOrTfkz-F1OQX42z0NqOBRTe0YKsa_qPE5Hgn0X-DDdoiFQj1Tb0W119b-qGrAYnkTHurhFgtCbF6wnzM91-uUYzXUJL4AHKRqQteH6wuAneg8Ex0wsQTmWKDAajgaPaEe9PH7wwfboijIWBuZxejz0TsLGLYwo5isgpfrayPrc1MowGxcg
        target: package-lock.json
    - name: Run benchmark
      run: npm run bench
